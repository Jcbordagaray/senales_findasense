<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Señales — Inteligencia de marca</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--s1:#111;--s2:#181818;--bd:#252525;
  --red:#E8351A;--red-bg:rgba(232,53,26,.1);--red-bd:rgba(232,53,26,.3);
  --amber:#F5A623;--green:#2DCE6C;
  --white:#F2F0EB;--muted:#666;--muted2:#444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto;padding:40px 32px}

.inspo{display:flex;gap:14px;align-items:flex-start;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;margin-bottom:32px}
.inspo-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);flex-shrink:0;margin-top:2px;line-height:1.4}
.inspo-text{font-size:13px;color:rgba(242,240,235,.65);line-height:1.65}
.inspo-text strong{color:var(--white);font-weight:500}
.inspo-text a{color:var(--red);text-decoration:none}
.inspo-text a:hover{text-decoration:underline}

.header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:40px}
.title{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.05;letter-spacing:-.02em}
.title em{font-style:normal;color:var(--red)}
.subtitle{font-size:14px;color:var(--muted);margin-top:8px}
.meta{text-align:right;font-size:12px;color:var(--muted);line-height:1.8;flex-shrink:0}
.meta strong{display:block;color:rgba(242,240,235,.7);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:2px}

.controls{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ctrl-full{grid-column:1/-1}
.ctrl label{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.ctrl input,.ctrl select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:10px 14px;color:var(--white);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.ctrl input:focus,.ctrl select:focus{border-color:var(--red)}
.ctrl select option{background:#1a1a1a}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.tag.on{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

.run-wrap{text-align:right;margin-bottom:32px}
.run{background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px 32px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em;cursor:pointer;transition:background .15s}
.run:hover{background:#c42c15}
.run:disabled{background:#3a1208;color:#7a3020;cursor:not-allowed}

.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;border:1px dashed var(--bd);border-radius:12px;gap:10px;color:var(--muted)}
.placeholder-icon{font-size:40px;opacity:.3}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}
.spinner{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:var(--muted)}

.result-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-bottom:14px}
.live-dot{color:var(--red);font-weight:600;display:flex;align-items:center;gap:6px}
.live-dot::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:22px}
.card.full{grid-column:1/-1}
.card.accent{border-color:var(--red-bd)}
.eye{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.eye.red{color:var(--red)}
.eye.amber{color:var(--amber)}
.eye.green{color:var(--green)}
.eye.gray{color:var(--muted)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}
.dot-amber{background:var(--amber)}
.dot-green{background:var(--green)}
.dot-gray{background:var(--muted)}

.summary{font-size:15px;color:rgba(242,240,235,.85);line-height:1.75}

.sent-brand{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 7px}
.sent-brand:first-child{margin-top:0}
.sent-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sent-label{font-size:12px;color:rgba(242,240,235,.5);width:70px;flex-shrink:0}
.sent-track{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden}
.sent-fill{height:100%;border-radius:3px}
.sent-pct{font-size:12px;font-weight:600;width:32px;text-align:right}

.voices-notice{font-size:12px;color:var(--muted);line-height:1.6;padding:12px 14px;background:var(--s2);border-radius:7px;margin-bottom:14px;font-style:italic}
.voice{padding:11px 0;border-bottom:1px solid var(--bd)}
.voice:last-child{border-bottom:none;padding-bottom:0}
.voice-meta{display:flex;justify-content:space-between;margin-bottom:5px}
.voice-src{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.voice-pos{font-size:11px;font-weight:600;color:var(--green)}
.voice-neg{font-size:11px;font-weight:600;color:var(--red)}
.voice-neu{font-size:11px;font-weight:600;color:var(--muted)}
.voice-text{font-size:13px;color:rgba(242,240,235,.8);line-height:1.6;font-style:italic}

.llm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.llm-item{background:var(--s2);border-radius:8px;padding:13px;text-align:center}
.llm-name{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.llm-hi{font-size:16px;font-weight:700;color:var(--green)}
.llm-med{font-size:16px;font-weight:700;color:var(--amber)}
.llm-lo{font-size:16px;font-weight:700;color:rgba(242,240,235,.35)}
.llm-no{font-size:16px;font-weight:700;color:var(--red)}
.llm-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.llm-notice{font-size:11px;color:var(--muted);font-style:italic;margin-top:12px;line-height:1.5}

.highlight{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;padding:14px 16px;margin-top:14px;font-size:13px;color:rgba(242,240,235,.8);line-height:1.65}
.highlight strong{color:var(--white)}
.idea-text{font-size:14px;color:rgba(242,240,235,.85);line-height:1.75}

.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;border:1px dashed var(--bd);border-radius:10px;gap:10px;text-align:center;padding:32px;margin-bottom:20px}
.no-data-icon{font-size:32px;opacity:.25}
.no-data-title{font-size:15px;font-weight:600;color:rgba(242,240,235,.6)}
.no-data-sub{font-size:13px;color:var(--muted);max-width:380px;line-height:1.6}

.cta{margin-top:28px;background:var(--s1);border:1px solid var(--red-bd);border-radius:12px;padding:28px 32px}
.cta-body{margin-bottom:20px}
.cta-body p{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.3;margin-bottom:8px;color:var(--white)}
.cta-body span{font-size:14px;color:rgba(242,240,235,.55);line-height:1.6;display:block}
.cta-btns{display:flex;gap:10px;flex-wrap:wrap}
.cta-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:13px 28px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;text-decoration:none;display:inline-block;transition:background .15s}
.cta-btn:hover{background:#c42c15}
.cta-btn2{background:transparent;color:rgba(242,240,235,.7);border:1px solid var(--bd);border-radius:7px;padding:13px 28px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.cta-btn2:hover{border-color:rgba(242,240,235,.4);color:var(--white)}

footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;font-size:11px;color:var(--muted2)}

@media(max-width:640px){
  .wrap{padding:24px 20px}
  .header{flex-direction:column}
  .meta{text-align:left}
  .controls{grid-template-columns:1fr}
  .ctrl-full{grid-column:1}
  .grid{grid-template-columns:1fr}
  .card.full{grid-column:1}
  .cta{padding:20px}
  footer{flex-direction:column;gap:6px}
}
</style>
</head>

    link: 'https://www.dandad.org/work/d-ad-awards-archive/draw-ketchup'

const CATEGORIES = {
  food:    'alimentos y bebidas, comidas preparadas',
  banking: 'banca, finanzas y servicios financieros',
  auto:    'automotriz, venta y postventa de vehículos',
  retail:  'retail, comercio y consumo masivo',
  telco:   'telecomunicaciones, internet y telefonía',
  pharma:  'farmacéutica, salud y medicamentos'
};

const KEYWORDS = {
  food:    [{k:'preparados',on:true},{k:'risotto',on:true},{k:'sabor',on:true},{k:'precio',on:false},{k:'practicidad',on:false},{k:'salado',on:false},{k:'recetas',on:false},{k:'supermercado',on:false}],
  banking: [{k:'atención al cliente',on:true},{k:'tasa de interés',on:true},{k:'app bancaria',on:true},{k:'comisiones',on:false},{k:'crédito',on:false},{k:'home banking',on:false},{k:'seguridad',on:false},{k:'turnos',on:false}],
  auto:    [{k:'concesionaria',on:true},{k:'postventa',on:true},{k:'precio',on:true},{k:'financiación',on:false},{k:'servicio técnico',on:false},{k:'repuestos',on:false},{k:'consumo',on:false},{k:'garantía',on:false}],
  retail:  [{k:'atención',on:true},{k:'envío',on:true},{k:'precio',on:true},{k:'devolución',on:false},{k:'stock',on:false},{k:'app',on:false},{k:'cuotas',on:false},{k:'local',on:false}],
  telco:   [{k:'señal',on:true},{k:'atención al cliente',on:true},{k:'velocidad',on:true},{k:'cortes',on:false},{k:'precio',on:false},{k:'app',on:false},{k:'portabilidad',on:false},{k:'fibra óptica',on:false}],
  pharma:  [{k:'eficacia',on:true},{k:'precio',on:true},{k:'disponibilidad',on:true},{k:'efectos adversos',on:false},{k:'farmacia',on:false},{k:'receta',on:false},{k:'genérico',on:false},{k:'cobertura',on:false}]
};

function loadKeywords() {
  const industry = document.getElementById('industry').value;
  const kws = KEYWORDS[industry] || KEYWORDS.food;
  const container = document.getElementById('tags');
  container.innerHTML = kws.map(kw =>
    `<span class="tag${kw.on?' on':''}" data-kw="${kw.k}">${kw.k}</span>`
  ).join('');
  container.querySelectorAll('.tag').forEach(t => t.addEventListener('click', () => t.classList.toggle('on')));

  // Update inspo case
  const inspo = INSPO_CASES[industry] || INSPO_CASES.food;
  document.getElementById('inspo-text').innerHTML =
    `<strong>${inspo.title}</strong> ${inspo.body} <a href="${inspo.link}" target="_blank">Ver caso →</a>`;
}

loadKeywords();

function getKws() {
  return [...document.querySelectorAll('.tag.on')].map(t => t.dataset.kw).join(', ') || 'preparados';
}

function ctaHTML(brand) {
  return `<div class="cta">
    <div class="cta-body">
      <p>Esto lo hicimos sin conectar fuentes de datos de ${brand}.<br>Imaginá lo que podríamos hacer si las conectamos.</p>
      <span>Agendemos una llamada y analizamos el tablero con tus datos reales.</span>
    </div>
    <div class="cta-btns">
      <a class="cta-btn" href="https://calendly.com/juancruz-bordagaray-ext-findasense/30min" target="_blank">Agendá una llamada →</a>
      <a class="cta-btn2" href="https://wa.me/5491121580222" target="_blank">WhatsApp</a>
    </div>
  </div>`;
}

function safeStr(s, fallback) {
  if (!s || typeof s !== 'string') return fallback || '';
  return s.slice(0, 600);
}

async function runAnalysis() {
  const brand    = document.getElementById('brand').value.trim() || 'Knorr';
  const comp     = document.getElementById('comp').value.trim() || 'Gallo, Alicante';
  const period   = document.getElementById('period').value;
  const kws      = getKws();
  const industry = document.getElementById('industry').value;
  const category = CATEGORIES[industry] || 'consumo masivo';
  const compList = comp.split(',').map(s => s.trim()).filter(Boolean);

  document.getElementById('hero-brand').textContent = brand;

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Analizando...';

  document.getElementById('results').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p class="loading-msg">Escuchando la conversación sobre ${brand}…</p>
    </div>`;

  // Build sentiment template only for known brands to keep JSON short
  const sentTemplate = [brand, ...compList]
    .map(b => `"${b}":{"p":0,"n":0,"g":0}`)
    .join(',');

  const prompt = `Analista de inteligencia de marca. Mercado Argentina. Categoría: ${category}.
Marca: ${brand} | Competidores: ${comp} | Keywords: ${kws}

Si ${brand} tiene poca presencia digital en Argentina en esta categoría, devolvé exactamente: {"ok":false,"motivo":"razón en una oración"}

Si hay datos suficientes, devolvé SOLO este JSON (sin texto extra, sin backticks, sin comentarios):
{"ok":true,"r":"resumen crítico en 1-2 oraciones","s":{${sentTemplate}},"v":[{"m":"marca","c":"Google|X|Foro","t":"comentario auténtico en voz coloquial argentina, entre 20 y 40 palabras, que suene a algo que alguien realmente escribiría","x":"p|n|u"},{"m":"","c":"","t":"","x":""},{"m":"","c":"","t":"","x":""},{"m":"","c":"","t":"","x":""},{"m":"","c":"","t":"","x":""}],"llm":{"ChatGPT":{"s":"Alta|Media|Baja|Ausente","n":"frase corta"},"Gemini":{"s":"Alta|Media|Baja|Ausente","n":"frase corta"},"Perplexity":{"s":"Alta|Media|Baja|Ausente","n":"frase corta"}},"gap":"1-2 oraciones","op":"1-2 oraciones","idea":"1-2 oraciones con formato y plataforma"}

Reglas: p+n+g de cada marca = 100. LLMs: evaluá presencia general de la marca, ignorá el período. Los comentarios en "v" deben sonar como texto real de un consumidor argentino — específicos, con opinión, sin ser genéricos.`;

  try {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1800,
        messages: [{role: 'user', content: prompt}]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content.map(b => b.text || '').join('');

    // Extract JSON robustly — find first { and last }
    const start = raw.indexOf('{');
    const end   = raw.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('no_json');

    const d = JSON.parse(raw.slice(start, end + 1));

    if (!d.ok) {
      renderInsuficiente(d.motivo, brand);
    } else {
      render(d, brand, compList, period, kws);
    }

  } catch(e) {
    // Always show a clean message, never a raw JS error
    renderInsuficiente('No hay suficiente conversación disponible para analizar estas variables. Probá ampliar el período, reducir las keywords activas o ajustar los competidores.', brand);
  }

  btn.disabled = false;
  btn.textContent = 'Regenerar →';
}

function renderInsuficiente(motivo, brand) {
  document.getElementById('results').innerHTML = `
    <div class="no-data">
      <div class="no-data-icon">◌</div>
      <p class="no-data-title">No hay suficiente conversación para analizar estas variables</p>
      <p class="no-data-sub">${motivo || 'Probá ampliar el período, reducir las keywords activas o ajustar los competidores.'}</p>
    </div>
    ${ctaHTML(brand)}`;
}

function render(d, brand, comps, period, kws) {
  const allBrands  = [brand, ...comps];
  const SC = {p:'#2DCE6C', n:'#E8351A', g:'#555'};
  const SL = {p:'positivo', n:'negativo', g:'neutral'};
  const VC = {p:'voice-pos', n:'voice-neg', u:'voice-neu'};
  const VL = {p:'↑ positivo', n:'↓ negativo', u:'→ neutro'};
  const LC = {Alta:'llm-hi', Media:'llm-med', Baja:'llm-lo', Ausente:'llm-no'};

  // Sentiment
  const sentHTML = allBrands.map(b => {
    const s = (d.s && d.s[b]) ? d.s[b] : {p:40,n:25,g:35};
    return `<div class="sent-brand">${b}</div>` +
      [['p','positivo'],['g','neutral'],['n','negativo']].map(([k,lbl]) =>
        `<div class="sent-row">
          <span class="sent-label">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</span>
          <div class="sent-track"><div class="sent-fill" style="width:${s[k]||0}%;background:${SC[k]}"></div></div>
          <span class="sent-pct" style="color:${SC[k]}">${s[k]||0}%</span>
        </div>`).join('');
  }).join('');

  // Voices
  const voicesHTML = (d.v||[]).filter(v=>v.t).map(v =>
    `<div class="voice">
      <div class="voice-meta">
        <span class="voice-src">${safeStr(v.m,'—')} · ${safeStr(v.c,'—')}</span>
        <span class="${VC[v.x]||'voice-neu'}">${VL[v.x]||'→ neutro'}</span>
      </div>
      <p class="voice-text">"${safeStr(v.t,'')}"</p>
    </div>`).join('');

  // LLM
  const llm = d.llm || {};
  const llmHTML = ['ChatGPT','Gemini','Perplexity'].map(name => {
    const info = llm[name] || {s:'Baja', n:'Sin datos suficientes'};
    return `<div class="llm-item">
      <div class="llm-name">${name}</div>
      <div class="${LC[info.s]||'llm-lo'}">${info.s||'Baja'}</div>
      <div class="llm-note">${safeStr(info.n,'—')}</div>
    </div>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="result-meta">
      <span>${brand} · ${comps.join(', ')} · ${period} · ${kws}</span>
      <span class="live-dot">en vivo</span>
    </div>

    <div class="grid">

      <div class="card full accent">
        <div class="eye red"><span class="dot dot-red"></span>Resumen ejecutivo</div>
        <p class="summary">${safeStr(d.r,'Sin datos suficientes para este análisis.')}</p>
      </div>

      <div class="card">
        <div class="eye amber"><span class="dot dot-amber"></span>Sentimiento por marca</div>
        ${sentHTML}
      </div>

      <div class="card">
        <div class="eye gray"><span class="dot dot-gray"></span>Síntesis de conversación — generada por IA</div>
        <p class="voices-notice">Estos fragmentos no son comentarios textuales. Son síntesis ilustrativas que la IA construye a partir del patrón general de conversación que existe sobre estas marcas. Conectarnos a las fuentes de datos de la marca es lo que hará que este análisis tenga comentarios reales.</p>
        ${voicesHTML || '<p style="font-size:13px;color:var(--muted)">Sin conversación suficiente para estas variables.</p>'}
      </div>

      <div class="card">
        <div class="eye gray"><span class="dot dot-gray"></span>Presencia en IA generativa</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:4px">¿Qué dice la IA cuando alguien pregunta por preparados en Argentina?</p>
        <div class="llm-grid">${llmHTML}</div>
        <p class="llm-notice">Esta evaluación refleja el conocimiento general del modelo sobre la marca, independientemente del período seleccionado.</p>
      </div>

      <div class="card">
        <div class="eye red"><span class="dot dot-red"></span>Gap digital · oportunidad</div>
        <p style="font-size:14px;color:rgba(242,240,235,.8);line-height:1.7">${safeStr(d.gap,'—')}</p>
        <div class="highlight"><strong>Oportunidad:</strong> ${safeStr(d.op,'—')}</div>
      </div>

      <div class="card">
        <div class="eye green"><span class="dot dot-green"></span>Idea de contenido</div>
        <p class="idea-text">${safeStr(d.idea,'—')}</p>
      </div>

    </div>

    ${ctaHTML(brand)}`;
}
</script>
</body>
</html>
